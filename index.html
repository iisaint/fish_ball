<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="丸東魚丸團購結單產生器 - 手機版，輕鬆管理團購訂單">
    <meta name="theme-color" content="#1e40af">
    <title>丸東魚丸 - 團購結單產生器</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- 載入失敗時顯示清除快取按鈕（只在 script/link 載入錯誤時觸發） -->
    <script>
      var _loadError = false;

      window.addEventListener('error', function(e) {
        var src = (e.target && (e.target.src || e.target.href)) || '';
        var isAppAsset = src.indexOf('/assets/') !== -1 || src.indexOf('/src/') !== -1;
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') && isAppAsset) {
          _loadError = true;
          showCacheFix();
        }
      }, true);

      function showCacheFix() {
        if (document.getElementById('cache-fix')) return;
        var el = document.createElement('div');
        el.id = 'cache-fix';
        el.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;background:#f9fafb;z-index:9999;';
        el.innerHTML = '<p style="color:#666;margin-bottom:16px;">頁面載入失敗，可能是快取問題</p>'
          + '<button onclick="clearAndReload()" style="background:#3b82f6;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;">清除快取並重新載入</button>';
        document.body.appendChild(el);
      }

      function clearAndReload() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
        setTimeout(function() { location.reload(true); }, 500);
      }
    </script>
</body>
</html>
